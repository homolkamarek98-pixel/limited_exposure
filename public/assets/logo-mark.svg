<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="LE — Limited Exposure">
  <!-- Outer square frame -->
  <rect x="0.5" y="0.5" width="47" height="47" stroke="#0A0A0A" stroke-width="1"/>
  <!-- Inner square frame (double border effect) -->
  <rect x="3.5" y="3.5" width="41" height="41" stroke="#0A0A0A" stroke-width="0.4"/>

  <!-- LE monogram -->
  <text
    x="24" y="31"
    font-family="'Playfair Display', 'Times New Roman', Georgia, serif"
    font-size="17"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#0A0A0A">LE</text>
</svg>
